# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SIGNALHOUND_SDK_URL: ${{ vars.SIGNALHOUND_SDK_URL || 'https://signalhound.com/sigdownloads/SDK/signal_hound_sdk_02_19_26.zip' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libusb-1.0-0-dev unzip curl

      - name: Cache SDK archive
        uses: actions/cache@v4
        with:
          path: .sdk_cache/sdk.zip
          key: signalhound-sdk-${{ hashFiles('scripts/bootstrap_sdk.sh') }}-${{ env.SIGNALHOUND_SDK_URL }}

      - name: Bootstrap Signal Hound SDK
        run: |
          bash scripts/bootstrap_sdk.sh
          echo "SIGNALHOUND_SDK_ROOT=$(pwd)/.sdk_cache/signal_hound_sdk" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSIGNALHOUND_SDK_ROOT="$SIGNALHOUND_SDK_ROOT"

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build -V --output-on-failure

      - name: Package
        run: |
          # The Signal Hound BB API and FTDI D2XX libraries (libbb_api, libftd2xx)
          # are proprietary and may not be redistributed. Users must obtain the
          # SDK from Signal Hound directly (hardware purchase entitles them to it).
          STAGE="sighound_transfer-${RELEASE_TAG}-linux-x64"
          mkdir "$STAGE"
          cp build/sighound_transfer "$STAGE/"

          ARCHIVE="${STAGE}.tar.gz"
          tar -czf "$ARCHIVE" "$STAGE"
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          cat "${ARCHIVE}.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Create GitHub release
        run: |
          gh release create "$RELEASE_TAG" \
            "$ARCHIVE" \
            "${ARCHIVE}.sha256" \
            --title "sighound_transfer $RELEASE_TAG" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
